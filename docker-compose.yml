services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: triprodeo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triprodeo_dev}
      POSTGRES_DB: triprodeo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triprodeo -d triprodeo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DATABASE_URL: postgresql://triprodeo:${POSTGRES_PASSWORD:-triprodeo_dev}@db:5432/triprodeo?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@triprodeo.com}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-triprodeo2025}
      CMS_ADMIN_SECRET: ${CMS_ADMIN_SECRET:-dev_cms_secret}
      SITE_URL: ${SITE_URL:-http://localhost:8080}
      SITE_NAME: Triprodeo
      SITE_DESCRIPTION: India's premier luxury villa and resort booking platform
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
